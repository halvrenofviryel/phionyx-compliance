# NIST AI RMF 1.0 — RGE envelope chain mapping.
# Consumed by phionyx_compliance.mapping.resolve_inputs.

template_version: "1.0.0"
framework: "NIST AI RMF 1.0 (MAP / MEASURE / MANAGE / GOVERN)"

inputs:

  # ── operator-supplied ─────────────────────────────────────────────
  provider_name:                  { category: operator_supplied, placeholder: "[OPERATOR: insert provider legal name]" }
  system_identifier:              { category: operator_supplied, placeholder: "[OPERATOR: insert system identifier]" }
  ai_use_case_category:           { category: operator_supplied, placeholder: "[OPERATOR: NIST AI use-case category]" }
  governance_policy_summary:      { category: operator_supplied, placeholder: "[OPERATOR: summarise GOVERN-function policy posture]" }
  roles_and_accountability:       { category: operator_supplied, placeholder: "[OPERATOR: who owns AI risk decisions]" }
  risk_tolerance_statement:       { category: operator_supplied, placeholder: "[OPERATOR: declared risk tolerance]" }
  intended_context:               { category: operator_supplied, placeholder: "[OPERATOR: MAP 1.x intended context]" }
  ai_capabilities_scope:          { category: operator_supplied, placeholder: "[OPERATOR: MAP 2.x declared capabilities + limitations]" }
  identified_risks:               { category: operator_supplied, placeholder: "[OPERATOR: MAP 5.x identified risks]" }
  out_of_chain_metrics:           { category: operator_supplied, placeholder: "[OPERATOR: MEASURE-relevant metrics tracked outside the chain]" }
  incident_response_procedure:    { category: operator_supplied, placeholder: "[OPERATOR: MANAGE 4.x incident response procedure]" }
  recovery_measures:              { category: operator_supplied, placeholder: "[OPERATOR: MANAGE 4.3 recovery procedures]" }
  stakeholder_communication:      { category: operator_supplied, placeholder: "[OPERATOR: stakeholder communication plan]" }
  anomaly_followup_instruction:   { category: operator_supplied, placeholder: "[OPERATOR: how anomalies are triaged]" }

  # ── chain-derived ──────────────────────────────────────────────────
  trace_id:        { category: chain_derived, source: "chain.trace_id" }
  window_start_iso: { category: chain_derived, source: "chain.envelopes[0].timestamp_utc" }
  window_end_iso:   { category: chain_derived, source: "chain.envelopes[-1].timestamp_utc" }
  envelope_count:   { category: chain_derived, source: "chain.envelope_count" }
  chain_valid:      { category: chain_derived, source: "chain.verify_result.valid" }

  tool_call_count:
    category: chain_derived
    source: chain.envelopes
    filter: { schema_id: "phionyx.governed_response_envelope.v0.2" }
    aggregator: count

  claim_count:
    category: chain_derived
    source: chain.envelopes
    filter: { "subject.kind": "agent_self_claim" }
    aggregator: count

  verdict_distribution:
    category: chain_derived
    source: chain.envelopes
    aggregator: count_by_field
    field: subject.decision

  distinct_descriptor_count:
    category: chain_derived
    source: chain.envelopes
    aggregator: distinct
    field: subject.tool_descriptor_hash

  descriptor_change_count:
    category: chain_derived
    source: chain.envelopes
    filter: { "subject.descriptor_change_detected": true }
    aggregator: count

  anomaly_count:
    category: chain_derived
    source: chain.envelopes
    filter: { "subject.anomaly_flag": true }
    aggregator: count

  signing_key_id:
    category: chain_derived
    source: chain.envelopes
    aggregator: first_or_varies
    field: integrity.key_id

  # ── derived (renderer helpers) ─────────────────────────────────────
  chain_valid_label:          { category: derived, function: render_chain_valid_label }
  verdict_distribution_table: { category: derived, function: render_verdict_distribution_table }
  chain_integrity_summary:    { category: derived, function: render_chain_integrity_summary }
  human_oversight_summary:    { category: derived, function: render_human_oversight_summary }
  generated_at_iso:           { category: derived, function: render_generated_at_iso }
  template_version:           { category: derived, source: template_metadata.template_version }
  reproduction_command:       { category: derived, function: render_reproduction_command }

  # ── canonical (constants) ──────────────────────────────────────────
  disclaimer_head: { category: canonical, source: "phionyx_compliance.CANONICAL_DISCLAIMER_HEAD" }
  disclaimer_tail: { category: canonical, source: "phionyx_compliance.CANONICAL_DISCLAIMER_TAIL" }
